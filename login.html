<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Class-Booking</title>
    <meta name="description" content="Sign in to your Class-Booking account.">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="supabase-auth.js"></script>
</head>

<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <main class="container">
        <div class="glass-card animate-fade-in">
            <h1>Welcome Back</h1>
            <p class="subtitle">Log in to your account.</p>

            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group" style="margin-bottom: 0.75rem;">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.875rem;">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; margin-bottom: 0;">
                        <input type="checkbox" style="width: 16px; height: 16px; margin: 0;"> Remember me
                    </label>
                    <a href="#" style="color: var(--primary); text-decoration: none;">Forgot password?</a>
                </div>

                <button type="submit" class="submit-btn" id="login-btn">Sign In</button>
            </form>

            <p class="footer-link">
                Don't have an account? <a href="signup.html">Sign up</a>
            </p>
        </div>
    </main>
</body>

</html>
