<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Class-Booking</title>
    <meta name="description" content="Create an account on Class-Booking to start booking your classes today.">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="supabase-auth.js"></script>
</head>

<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <main class="container">
        <div class="glass-card animate-fade-in">
            <h1>Create Account</h1>
            <p class="subtitle">Join Class-Booking today.</p>

            <form id="signup-form">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Email address</label>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="role">I am a...</label>
                    <select id="role" name="role"
                        style="width: 100%; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px 16px; color: var(--text-main); font-size: 1rem; appearance: none; cursor: pointer;">
                        <option value="student" style="background: var(--bg-dark);">Student</option>
                        <option value="teacher" style="background: var(--bg-dark);">Teacher</option>
                    </select>
                </div>

                <button type="submit" class="submit-btn" id="signup-btn">Get Started</button>
            </form>

            <p class="footer-link">
                Already have an account? <a href="login.html">Sign in</a>
            </p>
        </div>
    </main>
</body>

</html>
